[project]
name = "staddress"
version = "0.0.0"
description = "Official Python client for Staddress AI address parsing API"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
keywords = ["staddress", "address", "geocoding", "japan"]

dependencies = [
    "httpx>=0.27",
    "pydantic>=2.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-httpx>=0.30",
    "ruff>=0.4",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/staddress"]

[tool.pytest.ini_options]
testpaths = ["tests"]
